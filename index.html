<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learnistry</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6fa;}
header { background:#1e2a4a; color:white; padding:20px; text-align:center;}
.container { max-width:900px; margin:30px auto; background:white; padding:20px; border-radius:8px;}
textarea { width:100%; padding:10px;}
button { background:#1e2a4a; color:white; padding:10px 15px; border:none; margin:5px 0; cursor:pointer;}
.option-btn { display:block; width:100%; margin:8px 0; text-align:left;}
.progress { height:10px; background:#ddd; border-radius:5px;}
.progress-bar { height:10px; background:#1e2a4a; border-radius:5px;}
.correct { color:green;}
.wrong { color:red;}
</style>
</head>
<body>

<header>
<h1>Learnistry</h1>
<p>AI Quiz Platform</p>
</header>

<div class="container">

<button onclick="netlifyIdentity.open()">Login</button>
<button onclick="logout()">Logout</button>
<p id="userEmail"></p>
<p id="creditDisplay"></p>

<label>Role:</label>
<select id="roleSelect">
  <option value="student">Student</option>
  <option value="teacher">Teacher</option>
</select>

<button onclick="setRole()">Set Role</button>

<hr>

<h3>Class</h3>
<button onclick="createClass()">Create Class</button>
<input id="classInput" placeholder="Enter class ID"/>
<button onclick="joinClass()">Join Class</button>

<p id="classDisplay"></p>
<label>Difficulty:</label>
<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium" selected>Medium</option>
<option value="hard">Hard</option>
</select>

<textarea id="source" rows="6" placeholder="Paste lesson text"></textarea>
<button onclick="generate()">Generate Quiz</button>
<button onclick="pauseQuiz()">Pause</button>
<button onclick="resumeQuiz()">Resume</button>

<div id="quizArea"></div>

</div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
let currentUser=null,quizData=[],userAnswers=[],currentIndex=0,score=0,timerInterval,timeLeft=20,isPaused=false;

netlifyIdentity.on("init",user=>{if(user){currentUser=user;userEmail.innerText="Logged in: "+user.email;}});
netlifyIdentity.on("login",user=>{currentUser=user;userEmail.innerText="Logged in: "+user.email;netlifyIdentity.close();});
function logout(){netlifyIdentity.logout();location.reload();}

async function generate(){
if(!currentUser){alert("Login first");return;}
const source=source.value;
const difficulty=document.getElementById("difficulty").value;

const res=await fetch("/.netlify/functions/generate",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({source,userId:currentUser.id,difficulty})});

const data=await res.json();
if(data.error){quizArea.innerText=data.error;return;}

quizData=data.quiz.questions.map(q=>shuffleQuestion(q));
userAnswers=[];currentIndex=0;score=0;
creditDisplay.innerText="Credits: "+data.remainingCredits;
showQuestion();
}

function shuffleQuestion(q){
let options=[...q.options];
let correct=options[q.correctIndex];
options.sort(()=>Math.random()-0.5);
return {...q,options,correctIndex:options.indexOf(correct)};
}

function showQuestion(){
if(currentIndex>=quizData.length){finishQuiz();return;}
let progress=(currentIndex/quizData.length)*100;
let q=quizData[currentIndex];

quizArea.innerHTML=`
<div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
<p>Question ${currentIndex+1}/${quizData.length}</p>
<p>Time: <span id="timer">20</span>s</p>
<h3>${q.question}</h3>
${q.options.map((o,i)=>`<button class="option-btn" onclick="checkAnswer(${i})">${o}</button>`).join("")}
`;
startTimer();
}

function startTimer(){
timeLeft=20;
timerInterval=setInterval(()=>{
if(isPaused)return;
timeLeft--;
timer.innerText=timeLeft;
if(timeLeft<=0){clearInterval(timerInterval);userAnswers.push(null);currentIndex++;showQuestion();}
},1000);
}

function checkAnswer(i){
clearInterval(timerInterval);
userAnswers.push(i);
if(i===quizData[currentIndex].correctIndex)score++;
currentIndex++;showQuestion();
}

function pauseQuiz(){isPaused=true;}
function resumeQuiz(){isPaused=false;}

async function finishQuiz(){
let weak=[];
let html=`<h2>Score ${score}/${quizData.length}</h2>`;

quizData.forEach((q,i)=>{
let ua=userAnswers[i];
let correct=ua===q.correctIndex;
if(!correct)weak.push(q.question);
html+=`
<p><strong>${q.question}</strong></p>
<p class="${correct?'correct':'wrong'}">
Your: ${ua!==null?q.options[ua]:"No answer"}
</p>
<p class="correct">Correct: ${q.options[q.correctIndex]}</p>
<p>${q.explanation}</p><hr>
`;
});

if(weak.length>0){
html+=`<h3>Recommended Review:</h3><ul>${weak.map(w=>`<li>${w}</li>`).join("")}</ul>`;
}

html+=`<button onclick="exportPDF()">Export PDF</button>`;
quizArea.innerHTML=html;

await fetch("/.netlify/functions/saveResult",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId:currentUser.id,score,total:quizData.length})});
}

function exportPDF(){html2pdf().from(quizArea).save("quiz-results.pdf");}

document.addEventListener("copy",e=>e.preventDefault());
document.addEventListener("visibilitychange",()=>{if(document.hidden)alert("Tab switch detected");});

async function setRole(){
  const role=document.getElementById("roleSelect").value;
  await fetch("/.netlify/functions/setRole",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userId:currentUser.id,role})
  });
  alert("Role updated");
}

netlifyIdentity.on("init", user => {
  if (user) {
    currentUser = user;
    document.getElementById("userEmail").innerText =
      "Logged in: " + user.email;
  }
});

async function createClass() {

  if (!currentUser) {
    alert("Please login first.");
    return;
  }

  const response = await fetch("/.netlify/functions/createClass", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      userId: currentUser.id
    })
  });

  const data = await response.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById("classDisplay").innerText =
    "Class ID: " + data.classId;
}

async function joinClass(){
  const classId=classInput.value;
  await fetch("/.netlify/functions/joinClass",{method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({userId:currentUser.id,classId})});
  alert("Joined class");
}
</script>
</body>
</html>
