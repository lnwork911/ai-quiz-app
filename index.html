<!DOCTYPE html>
<html>
<head>
  <title>AI Quiz Generator</title>
</head>
<body>

<h2>AI Quiz Generator</h2>
<div>
  <button onclick="netlifyIdentity.open()">Login / Signup</button>
  <button onclick="logout()">Logout</button>
  <p id="userEmail"></p>
</div>

<textarea id="source" rows="10" cols="80"
placeholder="Paste lesson text here..."></textarea>
<br><br>

<button onclick="generate()">Generate Quiz</button>

<pre id="output"></pre>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>

let currentUser = null;

netlifyIdentity.on("init", user => {
  if (user) {
    currentUser = user;
    document.getElementById("userEmail").innerText =
      "Logged in as: " + user.email;
  }
});

netlifyIdentity.on("login", user => {
  currentUser = user;
  document.getElementById("userEmail").innerText =
    "Logged in as: " + user.email;
  netlifyIdentity.close();
});

function logout() {
  netlifyIdentity.logout();
  location.reload();
}

async function generate() {
  if (!currentUser) {
    alert("Please login first.");
    return;
  }

  const source = document.getElementById("source").value;

  const response = await fetch("/.netlify/functions/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      source,
      userId: currentUser.id
    })
  });

  const data = await response.json();

  if (data.error) {
    document.getElementById("output").innerText = data.error;
    return;
  }

  document.getElementById("output").innerText =
    data.quiz + "\n\nRemaining Credits: " + data.remainingCredits;
}

</script>
</body>
</html>
