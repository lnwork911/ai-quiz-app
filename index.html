<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learnistry</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6fa;}
header { background:#1e2a4a; color:white; padding:20px; text-align:center;}
.container { max-width:900px; margin:30px auto; background:white; padding:20px; border-radius:8px;}
textarea { width:100%; padding:10px;}
button { background:#1e2a4a; color:white; padding:10px 15px; border:none; margin:5px 0; cursor:pointer;}
.option-btn { display:block; width:100%; margin:8px 0; text-align:left;}
.progress { height:10px; background:#ddd; border-radius:5px;}
.progress-bar { height:10px; background:#1e2a4a; border-radius:5px;}
.correct { color:green;}
.wrong { color:red;}
</style>
</head>
<body>

<header>
<h1>Learnistry</h1>
<p>AI Quiz Platform</p>
</header>

<div class="container">

<button onclick="netlifyIdentity.open()">Login</button>
<button onclick="logout()">Logout</button>
<p id="userEmail"></p>
<p id="creditDisplay"></p>

<label>Role:</label>
<select id="roleSelect">
  <option value="student">Student</option>
  <option value="teacher">Teacher</option>
</select>

<button onclick="setRole()">Set Role</button>

<hr>

<h3>Class</h3>
<button onclick="createClass()">Create Class</button>
<input id="classInput" placeholder="Enter class ID"/>
<button onclick="joinClass()">Join Class</button>

<p id="classDisplay"></p>
<label>Difficulty level (1–5, adaptive):</label>
<select id="difficultyLevel">
<option value="1">1 — recall</option>
<option value="2">2 — basic</option>
<option value="3" selected>3 — apply</option>
<option value="4">4 — analyze</option>
<option value="5">5 — challenge</option>
</select>
<p class="field-hint" style="font-size:13px;color:#555;margin:4px 0 8px;">
  Question types: MCQ, true/false, short answer, fill-in-the-blank (use <code>_____</code> in stems).
</p>

<textarea id="source" rows="6" placeholder="Paste lesson text"></textarea>
<button onclick="generate()">Generate Quiz</button>
<button onclick="pauseQuiz()">Pause</button>
<button onclick="resumeQuiz()">Resume</button>

<div id="quizArea"></div>

</div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
let currentUser=null,quizData=[],userAnswers=[],currentIndex=0,score=0,timerInterval,timeLeft=20,isPaused=false,lastQuizMeta=null;

netlifyIdentity.on("init", user => {
  if (user) {
    currentUser = user;
    document.getElementById("userEmail").innerText =
      "Logged in: " + user.email;
  }
});

netlifyIdentity.on("init",user=>{if(user){currentUser=user;userEmail.innerText="Logged in: "+user.email;}});
netlifyIdentity.on("login", async user => {
  currentUser = user;

  document.getElementById("userEmail").innerText =
    "Logged in: " + user.email;

  await fetch("/.netlify/functions/initUser", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userId: user.id,
      email: user.email
    })
  });

  netlifyIdentity.close();
});

function logout(){netlifyIdentity.logout();location.reload();}
//const source=source.value;
async function generate(){

  if(!currentUser){
    alert("Login first");
    return;
  }

  const topic = document.getElementById("source").value.trim();
  if(!topic){ alert("Paste a topic or lesson text first"); return; }

  const difficultyLevel = parseInt(document.getElementById("difficultyLevel").value,10) || 3;
  let token = null;
  try {
    if (typeof currentUser.jwt === "function") {
      token = await currentUser.jwt();
    }
  } catch (e) {}
  if (!token && currentUser.token) {
    token = currentUser.token.access_token;
  }

  const res = await fetch("/.netlify/functions/generateQuiz", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      ...(token ? { Authorization: "Bearer " + token } : {}),
    },
    body: JSON.stringify({
      topic,
      gradeLevel: "General",
      questionCount: 6,
      difficultyLevel,
      questionTypes: ["mcq", "true_false", "short_answer", "fill_blank"],
    }),
  });

  const rawText = await res.text();
  let data = {};
  try {
    data = JSON.parse(rawText);
  } catch {
    data = { error: rawText.slice(0, 400) || "Invalid response (not JSON)" };
  }

  if (!res.ok) {
    const main = typeof data.error === "string" ? data.error : "";
    const detail = typeof data.detail === "string" ? data.detail : "";
    quizArea.innerText = [main, detail].filter(Boolean).join("\n\n") || "HTTP " + res.status;
    return;
  }

  lastQuizMeta = data.meta || null;
  const u = (lastQuizMeta && lastQuizMeta.usage) ? lastQuizMeta.usage : {};
  creditDisplay.innerText =
    "Last request — cached: " + !!(lastQuizMeta && lastQuizMeta.cached) +
    " | tokens: " + (u.total_tokens != null ? u.total_tokens : "—") +
    " | latency ms: " + (lastQuizMeta && lastQuizMeta.latencyMs != null ? lastQuizMeta.latencyMs : "—");

  quizData = data.quiz.questions.map((q) => prepareQuestionForUi(q));
  userAnswers = [];
  currentIndex = 0;
  score = 0;
  showQuestion();
}

/** Normalize server question into UI-friendly shape (shuffle MCQ options). */
function prepareQuestionForUi(q) {
  if (q.type === "mcq" && Array.isArray(q.options)) {
    return shuffleMcq(q);
  }
  return { ...q };
}

function shuffleMcq(q) {
  const options = [...q.options];
  const correct = options[q.correctIndex];
  options.sort(() => Math.random() - 0.5);
  return { ...q, options, correctIndex: options.indexOf(correct) };
}

function stemHtml(q) {
  const t = q.stem || q.question || "";
  return t.replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function showQuestion(){
if(currentIndex>=quizData.length){finishQuiz();return;}
let progress=(currentIndex/quizData.length)*100;
let q=quizData[currentIndex];
const stem = stemHtml(q);

if (q.type === "mcq") {
  quizArea.innerHTML = `
<div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
<p>Question ${currentIndex+1}/${quizData.length} <span style="font-size:12px;color:#666">(multiple choice)</span></p>
<p>Time: <span id="timer">20</span>s</p>
<h3>${stem}</h3>
${q.options.map((o,i)=>`<button class="option-btn" onclick="checkMcq(${i})">${String(o).replace(/</g,"&lt;")}</button>`).join("")}
`;
  startTimer(20);
  return;
}

if (q.type === "true_false") {
  quizArea.innerHTML = `
<div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
<p>Question ${currentIndex+1}/${quizData.length} <span style="font-size:12px;color:#666">(true / false)</span></p>
<p>Time: <span id="timer">20</span>s</p>
<h3>${stem}</h3>
<button class="option-btn" onclick="checkTrueFalse(true)">True</button>
<button class="option-btn" onclick="checkTrueFalse(false)">False</button>
`;
  startTimer(20);
  return;
}

if (q.type === "short_answer") {
  quizArea.innerHTML = `
<div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
<p>Question ${currentIndex+1}/${quizData.length} <span style="font-size:12px;color:#666">(short answer)</span></p>
<p>Time: <span id="timer">40</span>s</p>
<h3>${stem}</h3>
<input id="saInput" type="text" style="width:100%;padding:10px;margin:8px 0;box-sizing:border-box;" placeholder="Your answer" />
<button class="option-btn" onclick="checkShortAnswer()">Submit</button>
`;
  timeLeft = 40;
  startTimer(40);
  return;
}

if (q.type === "fill_blank") {
  quizArea.innerHTML = `
<div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
<p>Question ${currentIndex+1}/${quizData.length} <span style="font-size:12px;color:#666">(fill blanks)</span></p>
<p>Time: <span id="timer">40</span>s</p>
<div style="font-size:1.1rem;line-height:2;">${buildFillBlankHtml(q)}</div>
<button class="option-btn" onclick="checkFillBlank()">Submit</button>
`;
  timeLeft = 40;
  startTimer(40);
  return;
}

quizArea.innerHTML = "<p>Unsupported question type.</p>";
}

function buildFillBlankHtml(q) {
  const parts = String(q.stem || "").split("_____");
  const n = (q.blanks && q.blanks.length) ? q.blanks.length : Math.max(0, parts.length - 1);
  let out = "";
  for (let i = 0; i < n; i++) {
    const seg = parts[i] != null ? String(parts[i]) : "";
    out += seg.replace(/</g, "&lt;").replace(/>/g, "&gt;");
    out += `<input id="fb${i}" type="text" style="width:130px;padding:6px;margin:0 4px;" placeholder="${i+1}" />`;
  }
  if (parts.length > n) {
    out += String(parts[parts.length - 1]).replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  return out;
}

function startTimer(initialSeconds){
timeLeft = typeof initialSeconds === "number" ? initialSeconds : 20;
if(timerInterval)clearInterval(timerInterval);
timerInterval=setInterval(()=>{
if(isPaused)return;
timeLeft--;
const el=document.getElementById("timer");
if(el)el.innerText=timeLeft;
if(timeLeft<=0){clearInterval(timerInterval);userAnswers.push(null);currentIndex++;showQuestion();}
},1000);
}

function checkMcq(i){
clearInterval(timerInterval);
const q=quizData[currentIndex];
userAnswers.push({ kind:"mcq", index:i });
if(i===q.correctIndex)score++;
currentIndex++;showQuestion();
}

function checkTrueFalse(val){
clearInterval(timerInterval);
const q=quizData[currentIndex];
userAnswers.push({ kind:"tf", value:val });
if(val===q.correctBoolean)score++;
currentIndex++;showQuestion();
}

function normAns(s, ci){
const t=String(s||"").trim();
return ci?t.toLowerCase():t;
}

function checkShortAnswer(){
clearInterval(timerInterval);
const q=quizData[currentIndex];
const raw=document.getElementById("saInput");
const val=raw?raw.value:"";
const ci=!!q.caseInsensitive;
const n=normAns(val,ci);
const ok=(q.acceptableAnswers||[]).some(a=>normAns(a,ci)===n);
userAnswers.push({ kind:"short", text:val });
if(ok)score++;
currentIndex++;showQuestion();
}

function checkFillBlank(){
clearInterval(timerInterval);
const q=quizData[currentIndex];
const blanks=q.blanks||[];
const vals=[];
let all=true;
for(let i=0;i<blanks.length;i++){
const inp=document.getElementById("fb"+i);
const v=inp?inp.value:"";
vals.push(v);
const ci=!!q.caseInsensitive;
const n=normAns(v,ci);
const b=blanks[i]||{};
const primary=(b.answers||[]).map(x=>normAns(x,ci));
const alt=(b.alternatives||[]).map(x=>normAns(x,ci));
const hit=primary.includes(n)||alt.includes(n);
if(!hit)all=false;
}
userAnswers.push({ kind:"fill", values:vals });
if(all)score++;
currentIndex++;showQuestion();
}

function pauseQuiz(){isPaused=true;}
function resumeQuiz(){isPaused=false;}

async function finishQuiz(){
let weak=[];
let html=`<h2>Score ${score}/${quizData.length}</h2>`;

quizData.forEach((q,i)=>{
const ua=userAnswers[i];
let correct=false;
let yourLine="";
let correctLine="";

if(q.type==="mcq"){
  const idx=ua&&ua.kind==="mcq"?ua.index:null;
  correct=idx===q.correctIndex;
  yourLine=idx!==null&&q.options?q.options[idx]:"No answer";
  correctLine=q.options?q.options[q.correctIndex]:"";
}
else if(q.type==="true_false"){
  const v=ua&&ua.kind==="tf"?ua.value:null;
  correct=v===q.correctBoolean;
  yourLine=v===null?"No answer":String(v);
  correctLine=String(q.correctBoolean);
}
else if(q.type==="short_answer"){
  const t=ua&&ua.kind==="short"?ua.text:"";
  const ci=!!q.caseInsensitive;
  const n=normAns(t,ci);
  correct=(q.acceptableAnswers||[]).some(a=>normAns(a,ci)===n);
  yourLine=t||"No answer";
  correctLine=(q.acceptableAnswers||[]).join(" OR ");
}
else if(q.type==="fill_blank"){
  const vals=ua&&ua.kind==="fill"?ua.values:[];
  const blanks=q.blanks||[];
  correct=true;
  for(let j=0;j<blanks.length;j++){
    const ci=!!q.caseInsensitive;
    const n=normAns(vals[j],ci);
    const b=blanks[j]||{};
    const primary=(b.answers||[]).map(x=>normAns(x,ci));
    const alt=(b.alternatives||[]).map(x=>normAns(x,ci));
    if(!primary.includes(n)&&!alt.includes(n))correct=false;
  }
  yourLine=(vals&&vals.length)?vals.join(" | "):"No answer";
  correctLine=blanks.map(b=>(b.answers&&b.answers[0])?b.answers[0]:"?").join(" | ");
}

const label=q.stem||q.question||"(question)";
if(!correct)weak.push(label);
html+=`
<p><strong>${label.replace(/</g,"&lt;")}</strong> <span style="font-size:12px;color:#666">(${q.type})</span></p>
<p class="${correct?'correct':'wrong'}">Your: ${String(yourLine).replace(/</g,"&lt;")}</p>
<p class="correct">Correct: ${String(correctLine).replace(/</g,"&lt;")}</p>
<p>${String(q.explanation||"").replace(/</g,"&lt;")}</p><hr>
`;
});

if(weak.length>0){
html+=`<h3>Recommended Review:</h3><ul>${weak.map(w=>`<li>${String(w).replace(/</g,"&lt;")}</li>`).join("")}</ul>`;
}

html+=`<button onclick="exportPDF()">Export PDF</button>`;
quizArea.innerHTML=html;

await fetch("/.netlify/functions/saveResult",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId:currentUser.id,score,total:quizData.length})});
}

function exportPDF(){html2pdf().from(quizArea).save("quiz-results.pdf");}

document.addEventListener("copy",e=>e.preventDefault());
document.addEventListener("visibilitychange",()=>{if(document.hidden)alert("Tab switch detected");});

async function setRole(){
  const role=document.getElementById("roleSelect").value;
  await fetch("/.netlify/functions/setRole",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userId:currentUser.id,role})
  });
  alert("Role updated");
}

netlifyIdentity.on("init", user => {
  if (user) {
    currentUser = user;
    document.getElementById("userEmail").innerText =
      "Logged in: " + user.email;
  }
});

async function createClass() {

  if (!currentUser) {
    alert("Please login first.");
    return;
  }

  const response = await fetch("/.netlify/functions/createClass", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      userId: currentUser.id
    })
  });

  const data = await response.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  document.getElementById("classDisplay").innerText =
    "Class ID: " + data.classId;
}

async function joinClass(){
  const classId=classInput.value;
  await fetch("/.netlify/functions/joinClass",{method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({userId:currentUser.id,classId})});
  alert("Joined class");
}
</script>
</body>
</html>
