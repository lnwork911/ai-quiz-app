<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learnistry - AI Quiz Platform</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f7fb;
}

header {
  background: #1e2a4a;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 20px;
  background: white;
  border-radius: 8px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

textarea {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #1e2a4a;
  color: white;
  padding: 10px 18px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #2d3c6b;
}

.option-btn {
  display: block;
  width: 100%;
  margin: 8px 0;
  text-align: left;
}

.correct { color: green; }
.wrong { color: red; }

.review-box {
  border-top: 1px solid #ddd;
  padding-top: 15px;
  margin-top: 20px;
}
</style>
</head>
<body>

<header>
  <h1>Learnistry</h1>
  <p>AI-powered Quiz Generator for Teachers & Students</p>
</header>

<div class="container">

<div>
  <button onclick="netlifyIdentity.open()">Login / Signup</button>
  <button onclick="logout()">Logout</button>
  <p id="userEmail"></p>
  <p id="creditDisplay"></p>
</div>

<h3>Paste Lesson Text</h3>
<textarea id="source" rows="8" placeholder="Paste lesson text here..."></textarea>
<button onclick="generate()">Generate Quiz</button>

<div id="quizArea"></div>

</div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>

let currentUser = null;
let quizData = [];
let userAnswers = [];
let currentIndex = 0;
let score = 0;

netlifyIdentity.on("init", user => {
  if (user) {
    currentUser = user;
    document.getElementById("userEmail").innerText =
      "Logged in as: " + user.email;
  }
});

netlifyIdentity.on("login", user => {
  currentUser = user;
  document.getElementById("userEmail").innerText =
    "Logged in as: " + user.email;
  netlifyIdentity.close();
});

function logout() {
  netlifyIdentity.logout();
  location.reload();
}

async function generate() {

  if (!currentUser) {
    alert("Please login first.");
    return;
  }

  const source = document.getElementById("source").value;

  const response = await fetch("/.netlify/functions/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      source,
      userId: currentUser.id
    })
  });

  const data = await response.json();

  if (data.error) {
    document.getElementById("quizArea").innerText = data.error;
    return;
  }

  quizData = data.quiz.questions;
  userAnswers = [];
  currentIndex = 0;
  score = 0;

  document.getElementById("creditDisplay").innerText =
    "Remaining Credits: " + data.remainingCredits;

  showQuestion();
}

function showQuestion() {
  if (currentIndex >= quizData.length) {
    showFinalResults();
    return;
  }

  const q = quizData[currentIndex];

  let html = `<h3>Question ${currentIndex + 1}</h3>`;
  html += `<p>${q.question}</p>`;

  q.options.forEach((option, index) => {
    html += `
      <button class="option-btn"
        onclick="checkAnswer(${index})">
        ${option}
      </button>`;
  });

  document.getElementById("quizArea").innerHTML = html;
}

function checkAnswer(selectedIndex) {
  const q = quizData[currentIndex];
  userAnswers.push(selectedIndex);

  if (selectedIndex === q.correctIndex) {
    score++;
  }

  currentIndex++;
  showQuestion();
}

function showFinalResults() {

  let html = `<h2>Quiz Completed</h2>`;
  html += `<h3>Score: ${score} / ${quizData.length}</h3>`;

  html += `<div class="review-box"><h3>Review Answers</h3>`;

  let weakTopics = [];

  quizData.forEach((q, index) => {

    const correct = q.correctIndex === userAnswers[index];
    const statusClass = correct ? "correct" : "wrong";

    html += `<p><strong>Q${index+1}:</strong> ${q.question}</p>`;
    html += `<p class="${statusClass}">
      Your Answer: ${q.options[userAnswers[index]]}
    </p>`;

    html += `<p class="correct">
      Correct Answer: ${q.options[q.correctIndex]}
    </p>`;

    html += `<p><em>Explanation:</em> ${q.explanation}</p>`;

    if (!correct) {
      weakTopics.push(q.question);
    }

    html += "<hr>";
  });

  html += `</div>`;

  if (weakTopics.length > 0) {
    html += `
      <div class="review-box">
      <h3>Recommended Review</h3>
      <p>You may want to review concepts related to:</p>
      <ul>
        ${weakTopics.map(q => `<li>${q}</li>`).join("")}
      </ul>
      </div>
    `;
  } else {
    html += `
      <div class="review-box">
      <h3>Excellent Work!</h3>
      <p>You demonstrated strong understanding of the material.</p>
      </div>
    `;
  }

  document.getElementById("quizArea").innerHTML = html;
}

</script>

</body>
</html>
