<!DOCTYPE html>
<html>
<head>
  <title>AI Quiz Generator</title>
</head>
<body>

<h2>AI Quiz Generator</h2>

<textarea id="source" rows="10" cols="80"
placeholder="Paste lesson text here..."></textarea>
<br><br>

<button onclick="generate()">Generate Quiz</button>

<pre id="output"></pre>

<script>
// Generate simple random ID
function generateUserId() {
  return "user_" + Math.random().toString(36).substring(2, 12);
}

// Get or create userId
function getUserId() {
  let userId = localStorage.getItem("userId");
  if (!userId) {
    userId = generateUserId();
    localStorage.setItem("userId", userId);
  }
  return userId;
}

async function generate() {
  const source = document.getElementById("source").value;
  const userId = getUserId();

  const response = await fetch("/.netlify/functions/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ source, userId })
  });

  const data = await response.json();

  if (data.error) {
    document.getElementById("output").innerText = data.error;
    return;
  }

  document.getElementById("output").innerText =
    data.quiz + "\n\nRemaining Credits: " + data.remainingCredits;
}

</script>

</body>
</html>
