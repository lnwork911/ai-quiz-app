# Netlify configuration for Teacher Quiz SaaS (Phase 1)
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Static HTML + vanilla JS live at the repository root
  publish = "."
  command = "npm run build"
  functions = "netlify/functions"

[dev]
  framework = "#static"
  publish = "."
  functions = "netlify/functions"

# Security headers for all HTML/asset responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Content-Security-Policy removed: a strict CSP easily breaks Netlify Identity
    # iframe + API calls (missing email/password fields). Re-introduce a tightened
    # policy after verifying your real Identity URLs in the browser network tab.

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
